services:
  - type: web
    name: commis
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    # C6 — Health check pour éviter qu'un déploiement cassé reçoive du trafic
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: ENCRYPTION_SECRET
        sync: false
      # B3 — Nécessaire pour deleteAccount (suppression auth user via API Admin)
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: INSTAGRAM_SHARED_COOKIES
        sync: false
